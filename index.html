<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERIONMC.de</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        /* Hintergrund Logo */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('logo.png') center/cover no-repeat;
            filter: blur(20px) brightness(0.3);
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 90vh;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        .logo {
            width: 180px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 42px;
            color: #38bdf8;
            margin: 10px 0;
        }

        p {
            font-size: 22px;
            margin: 5px 0;
        }

        .highlight {
            color: #facc15;
            font-weight: bold;
        }

        /* Discord Bereich */
        .discord {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .discord a img {
            width: 45px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .discord a img:hover {
            transform: scale(1.2);
            filter: brightness(1.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="background"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <h1>ZERIONMC.de</h1>
    <p>dein Citybuild Server!</p>

    <p class="highlight">- SERVER IM AUFBAU -</p>
    <p class="highlight">SCHAU BALD WIEDER VORBEI!</p>
</div>

<div class="discord">
    <a href="http://discord.zerionmc.de" target="_blank">
        <img src="discord.png" alt="Discord">
    </a>
</div>

<script>
    console.log("Seite geladen!");
</script>

</body>
</html>
